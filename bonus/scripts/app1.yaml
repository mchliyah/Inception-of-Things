apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://V_ip/root/iouazzan.git
    path: .
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc 
    namespace: dev 
  syncPolicy:
    automated:  
      selfHeal: true  
      prune: true
